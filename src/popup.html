<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WA Poll Auto-Voter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <h1>WA Poll Auto-Voter</h1>

      <label for="primaryIndex">Primary Index (1-based)</label>
      <input id="primaryIndex" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 2" />

      <label for="secondaryIndex">Secondary Index (optional)</label>
      <input id="secondaryIndex" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 4" />

      <label class="checkbox-row" for="sourceModeEnabled">
        <input id="sourceModeEnabled" type="checkbox" />
        Use source matching
      </label>

      <label for="sourceText">Source Text</label>
      <input id="sourceText" type="text" placeholder="e.g. 1+1" />

      <div class="button-row">
        <button id="armUpdateButton" type="button">Arm / Update</button>
        <button id="disarmButton" type="button" class="secondary">Disarm</button>
      </div>

      <p id="errorText" class="error" aria-live="polite"></p>

      <section class="status">
        <p><strong>State:</strong> <span id="armedState">-</span></p>
        <p><strong>Result:</strong> <span id="lastResult">-</span></p>
        <p><strong>Latency:</strong> <span id="lastLatency">-</span></p>
        <p><strong>Focus/Visibility:</strong> <span id="focusVisibility">-</span></p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
